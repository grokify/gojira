site_name: GoJira
site_description: Go SDK and CLI for Jira
site_url: https://grokify.github.io/gojira/
repo_url: https://github.com/grokify/gojira
repo_name: grokify/gojira

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
  - CLI Reference:
      - Overview: cli/index.md
      - Authentication: cli/authentication.md
      - search: cli/search.md
      - get: cli/get.md
      - patch: cli/patch.md
      - export: cli/export.md
      - fields: cli/fields.md
      - stats: cli/stats.md
  - SDK Guide:
      - Overview: sdk/index.md
      - Client: sdk/client.md
      - Issues: sdk/issues.md
      - JQL Builder: sdk/jql.md
  - Guides:
      - AI Agents: guides/ai-agents.md
      - JQL Examples: guides/jql-examples.md
  - Releases:
      - v0.29.0: releases/v0.29.0.md
      - v0.28.0: releases/v0.28.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/grokify/gojira
